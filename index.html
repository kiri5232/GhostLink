<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title><!-- jsPDF for PDF download --><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* Particle Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.box {
  max-width: 400px;
  margin: 80px auto;
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,255,255,0.5);
}

input, button {
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: cyan;
  cursor: pointer;
}

.hidden { display: none; }
.status { color: lime; }
.loading { font-size: 18px; }
</style></head><body>
<canvas id="bg"></canvas><div class="box">
<h2>🔍 Certificate Verification</h2>
<input type="text" id="certId" placeholder="Enter Certificate ID">
<br>
<button onclick="verify()">Verify</button><div id="loading" class="hidden loading">
⏳ Verifying your certificate...
</div><div id="result" class="hidden">
<h3 class="status">✅ Verified Certificate</h3>
<p>🔐 Officially Registered</p>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Title:</b> <span id="reason"></span></p>
<p><b>Date:</b> <span id="date"></span></p>
<p><b>Issued By:</b> Rayzen</p>
<p>📊 Only <span id="count"></span> people received this certificate</p>
<button onclick="downloadPDF()">⬇ Download Certificate</button>
</div>
</div><audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
const data = {
  "RZ001": {name: "Aman", reason: "Certified Legend", date: "2026"},
  "RZ002": {name: "Sneha", reason: "Most Loyal Friend", date: "2026"},
  "RZ003": {name: "Rahul", reason: "Comedy King", date: "2026"}
};

// AUTO QR DETECT
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  if (id) {
    document.getElementById("certId").value = id;
    verify();
  }
};

function verify() {
  let id = document.getElementById("certId").value.toUpperCase();
  let loading = document.getElementById("loading");
  let result = document.getElementById("result");

  loading.classList.remove("hidden");
  result.classList.add("hidden");
  document.getElementById("beep").play();

  setTimeout(() => {
    loading.classList.add("hidden");

    if (data[id]) {
      document.getElementById("name").innerText = data[id].name;
      document.getElementById("reason").innerText = data[id].reason;
      document.getElementById("date").innerText = data[id].date;
      document.getElementById("count").innerText = Object.keys(data).length;
      result.classList.remove("hidden");
      window.currentID = id;
    } else {
      alert("❌ Invalid Certificate ID");
    }
  }, 2500);
}

// PDF DOWNLOAD
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let user = data[window.currentID];

  doc.setFontSize(20);
  doc.text("Certificate of Achievement", 20, 30);

  doc.setFontSize(14);
  doc.text(`This certificate is awarded to`, 20, 50);
  doc.setFontSize(18);
  doc.text(user.name, 20, 65);

  doc.setFontSize(14);
  doc.text(`For: ${user.reason}`, 20, 85);
  doc.text(`Date: ${user.date}`, 20, 100);
  doc.text(`Issued By: Rayzen`, 20, 115);

  doc.save(user.name + "_certificate.pdf");
}

// PARTICLE BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: Math.random() - 0.5,
    dy: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "cyan";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();
</script></body>
  </html>
