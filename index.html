<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

.box {
  max-width: 400px;
  margin: 80px auto;
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0,255,255,0.5);
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 8px;
  border: none;
  margin: 10px 0;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: cyan;
  cursor: pointer;
}

.hidden { display: none; }
.status { color: lime; }
.loading { font-size: 18px; }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">
<h2>🔍 Certificate Verification</h2>

<input type="text" id="certId" placeholder="Enter Certificate ID">
<br>
<button onclick="verify()">Verify</button>

<div id="loading" class="hidden loading">
⏳ Verifying your certificate...
</div>

<div id="result" class="hidden">
<h3 class="status">✅ Verified Certificate</h3>
<p>🔐 Officially Registered</p>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Title:</b> <span id="reason"></span></p>
<p><b>Date:</b> <span id="date"></span></p>
<p><b>Issued By:</b> Rayzen</p>
<p>📊 Only <span id="count"></span> people received this certificate</p>
<button onclick="downloadPDF()">⬇ Download Certificate</button>
</div>
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
const data = {
  "RZ001": {name: "Aman", reason: "Certified Legend", date: "2026"},
  "RZ002": {name: "Sneha", reason: "Most Loyal Friend", date: "2026"},
  "RZ003": {name: "Rahul", reason: "Comedy King", date: "2026"}
};

let currentID = null;

// AUTO QR DETECT
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  if (id && data[id]) {
    document.getElementById("certId").value = id;
    verify();
  }
};

function verify() {
  let id = document.getElementById("certId").value.trim().toUpperCase();
  let loading = document.getElementById("loading");
  let result = document.getElementById("result");

  if (!id) {
    alert("Enter Certificate ID");
    return;
  }

  loading.classList.remove("hidden");
  result.classList.add("hidden");
  document.getElementById("beep").play();

  setTimeout(() => {
    loading.classList.add("hidden");

    if (data[id]) {
      currentID = id;
      document.getElementById("name").innerText = data[id].name;
      document.getElementById("reason").innerText = data[id].reason;
      document.getElementById("date").innerText = data[id].date;
      document.getElementById("count").innerText = Object.keys(data).length;
      result.classList.remove("hidden");
    } else {
      alert("❌ Invalid Certificate ID");
    }
  }, 2000);
}

// 🔥 PREMIUM PDF DOWNLOAD
function downloadPDF() {
  if (!currentID) {
    alert("Pehle verify karo 😏");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let user = data[currentID];

  // 🌌 Background
  doc.setFillColor(10, 10, 30);
  doc.rect(0, 0, 210, 297, "F");

  // 🎨 Border
  doc.setDrawColor(0, 255, 255);
  doc.setLineWidth(2);
  doc.rect(10, 10, 190, 277);
  doc.rect(15, 15, 180, 267);

  // 🏆 Title
  doc.setFont("helvetica", "bold");
  doc.setFontSize(26);
  doc.setTextColor(0, 255, 255);
  doc.text("CERTIFICATE", 105, 40, null, null, "center");

  doc.setFontSize(18);
  doc.setTextColor(255, 255, 255);
  doc.text("OF ACHIEVEMENT", 105, 55, null, null, "center");

  // ✨ Subtitle
  doc.setFontSize(14);
  doc.text("This certificate is proudly awarded to", 105, 80, null, null, "center");

  // 🔥 Name
  doc.setFontSize(24);
  doc.setTextColor(0, 255, 255);
  doc.text(user.name.toUpperCase(), 105, 105, null, null, "center");

  // Line
  doc.setDrawColor(255, 255, 255);
  doc.line(40, 110, 170, 110);

  // Reason
  doc.setFontSize(14);
  doc.setTextColor(255, 255, 255);
  doc.text("For: " + user.reason, 105, 135, null, null, "center");

  // Date
  doc.text("Date: " + user.date, 105, 155, null, null, "center");

  // Signature
  doc.setFontSize(12);
  doc.text("__________________", 140, 240);
  doc.text("Rayzen", 155, 250);
  doc.text("Authorized Signature", 135, 260);

  // 🔐 QR
  let qrURL = window.location.origin + window.location.pathname + "?id=" + currentID;

  let qrImg = new Image();
  qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(qrURL);

  qrImg.onload = function () {
    doc.addImage(qrImg, "PNG", 80, 175, 50, 50);
    doc.save(user.name + "_premium_certificate.pdf");
  };
}

// PARTICLE BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    dx: Math.random() - 0.5,
    dy: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "cyan";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
  </html>
