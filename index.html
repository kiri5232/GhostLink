<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  overflow: hidden;
  background: black;
}

/* 🔥 PARTICLES CANVAS */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* BOX UI */
.box {
  max-width: 400px;
  margin: 100px auto;
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 25px cyan;
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 8px;
  border: none;
  margin: 10px 0;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: cyan;
  cursor: pointer;
}

.hidden { display: none; }
.status { color: lime; }
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="box">
<h2>🔍 Certificate Verification</h2>

<input type="text" id="certId" placeholder="Enter Certificate ID">
<br>
<button onclick="verify()">Verify</button>

<div id="loading" class="hidden">
⏳ Verifying...
</div>

<div id="result" class="hidden">
<h3 class="status">✅ Verified Certificate</h3>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Title:</b> <span id="reason"></span></p>
<p><b>Date:</b> <span id="date"></span></p>
<p>📊 Only <span id="count"></span> people got this</p>

<button onclick="downloadPDF()">⬇ Download PDF</button>
</div>
</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

// 🔥 DATABASE
const data = {
  "RZ001": {name: "Aman", reason: "Certified Legend", date: "2026"},
  "RZ002": {name: "Sneha", reason: "Most Loyal Friend", date: "2026"},
  "RZ003": {name: "Rahul", reason: "Comedy King", date: "2026"}
};

// 🎯 VERIFY FUNCTION
function verify(idParam=null) {
  let id = idParam || document.getElementById("certId").value.toUpperCase();

  let loading = document.getElementById("loading");
  let result = document.getElementById("result");

  loading.classList.remove("hidden");
  result.classList.add("hidden");

  document.getElementById("beep").play();

  setTimeout(() => {
    loading.classList.add("hidden");

    if (data[id]) {
      document.getElementById("name").innerText = data[id].name;
      document.getElementById("reason").innerText = data[id].reason;
      document.getElementById("date").innerText = data[id].date;
      document.getElementById("count").innerText = Object.keys(data).length;
      result.classList.remove("hidden");
    } else {
      alert("❌ Invalid Certificate ID");
    }

  }, 2000);
}

// 🤖 AUTO QR DETECT
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (id) {
    document.getElementById("certId").value = id;
    verify(id);
  }
};

// 📄 PDF DOWNLOAD
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let name = document.getElementById("name").innerText;
  let reason = document.getElementById("reason").innerText;
  let date = document.getElementById("date").innerText;

  doc.text("Certificate of Achievement", 20, 30);
  doc.text("This is awarded to:", 20, 50);
  doc.text(name, 20, 60);
  doc.text(reason, 20, 70);
  doc.text("Date: " + date, 20, 80);

  doc.save(name + "_certificate.pdf");
}

// ✨ PARTICLES ANIMATION
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: Math.random() - 0.5,
    speedY: Math.random() - 0.5
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
  </html>
